# ============================================================
#  素珍管理系统 - Docker Compose 配置（客户交付版）
#  使用预构建镜像，数据通过 Docker 命名卷持久化
# ============================================================

version: "3.9"

services:
  # ---- 后端 Flask 服务 ----
  backend:
    image: suzhen-backend:latest
    container_name: suzhen-backend
    volumes:
      - suzhen-data:/data
    restart: unless-stopped
    networks:
      - suzhen-net
    environment:
      - FLASK_DEBUG=false
      - SECRET_KEY=suzhen-prod-8a7f2c3b9e1d4f6a
      - DATABASE_PATH=/data/suzhen.db
      - STORAGE_UPLOAD_FOLDER=/data/uploads

  # ---- 前端 nginx 服务 ----
  frontend:
    image: suzhen-frontend:latest
    container_name: suzhen-frontend
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - suzhen-net
    depends_on:
      - backend

# ---- 命名卷（数据持久化，对客户透明） ----
volumes:
  suzhen-data:
    name: suzhen-data

# ---- 自定义网络 ----
networks:
  suzhen-net:
    driver: bridge
    name: suzhen-net
