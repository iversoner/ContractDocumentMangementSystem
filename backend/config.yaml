# ============================================================
#  Suzhen Management System - Configuration
# ============================================================

app:
  name: Suzhen Management System
  secret_key: suzhen-secret-key-change-in-production
  debug: true

server:
  host: 0.0.0.0
  port: 5000

database:
  path: backend/database/suzhen.db

# Default admin (auto-created on first startup)
admin:
  username: admin
  password: admin!
  display_name: Admin
  email: admin@suzhen.com

# Email service configuration
email:
  smtp_server: smtp.163.com
  smtp_port: 465
  username: ""
  password: ""
  use_tls: false
  sender_name: Suzhen Management System

# File storage
storage:
  upload_folder: backend/uploads
  max_file_size: 10485760  # 10 MB

# Expiry reminder
reminder:
  enabled: false
  days_before: 30
  send_time: "09:00"

# Windows host data directory (for path translation, overridden by HOST_DATA_DIR env var in Docker)
host_data_dir: ""
