<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 素珍管理系统</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo" style="display: flex; align-items: center; gap: 10px;">
      <button class="menu-toggle" id="menuToggle" title="菜单">&#9776;</button>
      <span>🌐 素珍管理系统</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html">仪表盘</a>
      <a href="contract.html">合同管理</a>
      <a href="patent.html">专利管理</a>
      <a href="insurance.html">车险续期</a>
      <a href="files.html">文件管理</a>
      <a href="users.html" class="active">用户管理</a>
      <a href="settings.html" class="admin-only">系统配置</a>
      <a href="logs.html">系统日志</a>
      <a href="export.html">数据导出</a>
    </div>
    <div class="nav-user">
      <span style="font-size:13px;" id="navUserName">管理员</span>
      <span class="avatar" id="navUserAvatar">管</span>
      <a href="javascript:handleLogout()" class="btn btn-outline btn-sm">退出</a>
    </div>
  </nav>

  <aside class="sidebar" id="sidebar">
    <div class="menu-group">
      <div class="menu-group-title">主菜单</div>
      <a href="dashboard.html" class="menu-item"><span class="icon">📊</span> 仪表盘</a>
    </div>
    <div class="menu-group">
      <div class="menu-group-title">业务管理</div>
      <a href="contract.html" class="menu-item"><span class="icon">📋</span> 合同管理</a>
      <a href="patent.html" class="menu-item"><span class="icon">💡</span> 专利管理</a>
      <a href="insurance.html" class="menu-item"><span class="icon">🚗</span> 车险续期</a>
      <a href="files.html" class="menu-item"><span class="icon">📁</span> 文件管理</a>
    </div>
    <div class="menu-group">
      <div class="menu-group-title">系统管理</div>
      <a href="users.html" class="menu-item active"><span class="icon">👥</span> 用户管理</a>
      <a href="settings.html" class="menu-item admin-only"><span class="icon">⚙️</span> 系统配置</a>
      <a href="logs.html" class="menu-item"><span class="icon">📜</span> 系统日志</a>
      <a href="export.html" class="menu-item"><span class="icon">📤</span> 数据导出</a>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main-content">
    <div class="page-header">
      <h1>👥 用户管理</h1>
      <div class="breadcrumb">首页 / 用户管理</div>
    </div>

    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;">
        <div class="search-bar" style="margin-bottom: 0;">
          <select class="form-control" id="filterUserRole">
            <option value="">全部角色</option>
            <option value="管理员">管理员</option>
            <option value="业务员">业务员</option>
            <option value="财务">财务</option>
          </select>
          <select class="form-control" id="filterUserStatus">
            <option value="">全部状态</option>
            <option value="active">启用</option>
            <option value="inactive">禁用</option>
          </select>
          <input type="text" class="form-control" id="userSearch" placeholder="搜索用户名/姓名..." onkeydown="if(event.key==='Enter')renderUsers()">
          <button class="btn btn-primary btn-sm" onclick="renderUsers()">🔍 搜索</button>
        </div>
        <button class="btn btn-primary admin-only" onclick="openUserModal()">＋ 新增用户</button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>用户名</th>
              <th>姓名</th>
              <th>邮箱</th>
              <th>角色</th>
              <th>状态</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="userPagination"></div>
    </div>
  </main>

  <!-- 新增/编辑用户模态框 -->
  <div class="modal-backdrop" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="userModalTitle">新增用户</h2>
        <button class="modal-close" onclick="closeModal('userModal')">&times;</button>
      </div>
      <form onsubmit="saveUser(event)">
        <input type="hidden" id="userId">
        <div class="form-row">
          <div class="form-group">
            <label>用户名 *</label>
            <input type="text" class="form-control" id="userUsername" required placeholder="请输入用户名">
          </div>
          <div class="form-group">
            <label>姓名 *</label>
            <input type="text" class="form-control" id="userDisplayName" required placeholder="请输入姓名">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>邮箱 *</label>
            <input type="email" class="form-control" id="userEmail" required placeholder="user@suzhen.com">
          </div>
          <div class="form-group">
            <label>角色 *</label>
            <select class="form-control" id="userRole" required>
              <option value="">请选择</option>
              <option value="管理员">管理员</option>
              <option value="业务员">业务员</option>
              <option value="财务">财务</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>密码 *</label>
          <input type="password" class="form-control" id="userPassword" required placeholder="请输入初始密码">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('userModal')">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    let userPage = 1;
    const userPageSize = 10;

    async function loadUsers() {
      const params = { page: userPage, pageSize: userPageSize };
      if (document.getElementById('filterUserRole').value) params.role = document.getElementById('filterUserRole').value;
      if (document.getElementById('filterUserStatus').value) params.status = document.getElementById('filterUserStatus').value;
      if (document.getElementById('userSearch').value) params.keyword = document.getElementById('userSearch').value;
      try { const res = await API.get('/users', params); return res.data; }
      catch (err) { showToast('加载失败: ' + err.message, 'error'); return { items: [], total: 0 }; }
    }

    function renderUsers() { userPage = 1; renderUserTable(); }

    async function renderUserTable() {
      const data = await loadUsers();
      const tbody = document.getElementById('userTableBody');

      if (data.items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:40px; color:var(--text-muted);">暂无用户</td></tr>`;
      } else {
        tbody.innerHTML = data.items.map(u => `
          <tr>
            <td>${u.id}</td>
            <td><strong>${u.username}</strong></td>
            <td>${u.displayName}</td>
            <td>${u.email}</td>
            <td>${u.role}</td>
            <td>${getStatusBadge(u.status)}</td>
            <td>${u.createdAt || u.createTime}</td>
            <td>
              <button class="btn btn-outline btn-sm admin-only" onclick="editUser(${u.id})">编辑</button>
              <button class="btn btn-outline btn-sm admin-only" onclick="resetUserPassword(${u.id}, '${u.displayName.replace(/'/g, "\\'")}')">重置密码</button>
              <button class="btn btn-danger btn-sm admin-only" onclick="deleteUser(${u.id}, '${u.displayName.replace(/'/g, "\\'")}')">删除</button>
            </td>
          </tr>
        `).join('');
      }

      const totalPages = Math.ceil(data.total / userPageSize);
      const pag = document.getElementById('userPagination');
      if (totalPages <= 1) { pag.innerHTML = ''; return; }
      let html = `<button class="page-btn" onclick="goUserPage(${userPage - 1})" ${userPage === 1 ? 'disabled' : ''}>&laquo;</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-btn ${i === userPage ? 'active' : ''}" onclick="goUserPage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" onclick="goUserPage(${userPage + 1})" ${userPage === totalPages ? 'disabled' : ''}>&raquo;</button>`;
      pag.innerHTML = html;
    }

    function goUserPage(p) { userPage = p; renderUserTable(); }

    async function deleteUser(id, name) {
      if (!confirm('确定删除用户「' + name + '」吗？')) return;
      try { await API.del('/users/' + id); showToast('用户已删除', 'success'); renderUserTable(); }
      catch (err) { showToast('删除失败: ' + err.message, 'error'); }
    }
    async function resetUserPassword(id, name) {
      const newPwd = prompt('输入用户「' + name + '」的新密码:', '123456');
      if (!newPwd) return;
      try { const res = await API.put('/users/' + id + '/reset-password', { password: newPwd }); showToast(res.message, 'success'); }
      catch (err) { showToast('重置失败: ' + err.message, 'error'); }
    }

    function openUserModal() {
      document.getElementById('userModalTitle').textContent = '新增用户';
      ['userId','userUsername','userDisplayName','userEmail','userRole','userPassword'].forEach(id => {
        document.getElementById(id).value = '';
      });
      openModal('userModal');
    }

    function editUser(id) {
      API.get('/users/' + id).then(res => { const u = res.data;
      document.getElementById('userModalTitle').textContent = '编辑用户';
      document.getElementById('userId').value = u.id;
      document.getElementById('userUsername').value = u.username;
      document.getElementById('userDisplayName').value = u.displayName;
      document.getElementById('userEmail').value = u.email;
      document.getElementById('userRole').value = u.role;
      document.getElementById('userPassword').value = '********';
      document.getElementById('userPassword').required = false;
      openModal('userModal');
    }).catch(err => showToast('获取用户失败: ' + err.message, 'error'));
    }

    async function saveUser(e) {
      e.preventDefault();
      const id = document.getElementById('userId').value;
      const body = {
        username: document.getElementById('userUsername').value,
        displayName: document.getElementById('userDisplayName').value,
        email: document.getElementById('userEmail').value,
        role: document.getElementById('userRole').value,
      };
      if (!id) body.password = document.getElementById('userPassword').value;
      try {
        if (id) { await API.put('/users/' + id, body); showToast('用户已更新', 'success'); }
        else { await API.post('/users', body); showToast('用户已添加', 'success'); }
        closeModal('userModal'); renderUserTable();
      } catch (err) { showToast('保存失败: ' + err.message, 'error'); }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // 非管理员跳转回仪表盘
      if (!isAdmin()) {
        window.location.href = 'dashboard.html';
        return;
      }
      renderUserTable();
    });
  </script>
</body>
</html>
