# ============================================================
#  Suzhen Management System - Docker Compose Configuration
#  Full-stack deployment: frontend nginx + backend Flask + data persistence
#
#  Data directory and port configured via .env file (generated by setup.bat)
# ============================================================

version: "3.9"

services:
  # ---- Backend Flask Service ----
  backend:
    image: suzhen-backend:latest
    container_name: suzhen-backend
    volumes:
      - ${DATA_DIR:-./data}:/data       # User-selected data storage directory
    restart: unless-stopped
    networks:
      - suzhen-net
    environment:
      - FLASK_DEBUG=false
      - DATABASE_PATH=/data/suzhen.db
      - STORAGE_UPLOAD_FOLDER=/data/uploads

  # ---- Frontend nginx Service ----
  frontend:
    image: suzhen-frontend:latest
    container_name: suzhen-frontend
    ports:
      - "${APP_PORT:-8080}:80"               # User-configurable port
    restart: unless-stopped
    networks:
      - suzhen-net
    depends_on:
      - backend

# ---- Custom Network ----
networks:
  suzhen-net:
    driver: bridge
    name: suzhen-net
