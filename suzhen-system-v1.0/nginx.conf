# ============================================================
#  Suzhen Management System - Nginx Configuration
#  Static file service + gzip compression + Caching strategies
# ============================================================

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # -------------------------------------------------------
    # gzip to speed compression
    # -------------------------------------------------------
    gzip  on;
    gzip_vary  on;
    gzip_proxied  any;
    gzip_comp_level  6;
    gzip_min_length  256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/html;

    # -------------------------------------------------------
    # Main server
    # -------------------------------------------------------
    server {
        listen       80;
        server_name  _;              # Match all domains/IPs

        root   /usr/share/nginx/html;
        index  index.html;

        charset  utf-8;

        # ---- Caching strategies ----
        # HTML no-cache (ensure latest content)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Static resources long cache (CSS/JS/images/fonts with hash version control)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ---- SPA routing fallback ----
        # Fallback to index.html (login page)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---- API reverse proxy -> Backend Flask ----
        location /api/ {
            proxy_pass http://backend:5000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # File upload size limit
            client_max_body_size 20m;
        }

        # ---- Security headers ----
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ---- Prevent access to hidden files ----
        location ~ /\. {
            deny  all;
            access_log off;
        }
    }
}
